name = "person-service"
main = "src/index.ts"
compatibility_date = "2026-07-01"

# The Worker performs NO auth itself — Cloudflare Access enforces at the edge post-deploy
# (see src/index.ts header comment). For that to be the ENTIRE boundary, the Worker must NOT
# be reachable at its public *.workers.dev URL (which bypasses the custom-domain Access app):
workers_dev = false

[[d1_databases]]
binding = "DB"
database_name = "person-service"
database_id = "6f44025d-a523-46d3-b2d2-1ad7fcd272aa"

# Custom domain: the ENTIRE public surface of this Worker. Cloudflare Access (a
# self-hosted app on this exact hostname — see docs/deploy-runbook.md Wave 2 step 4)
# is the whole auth boundary in front of it. Lockstep: pages-deploy.yml bakes
# VITE_PERSON_SERVICE_URL=https://notifs-people.4irl.app — keep the two in sync.
[[routes]]
pattern = "notifs-people.4irl.app"
custom_domain = true
