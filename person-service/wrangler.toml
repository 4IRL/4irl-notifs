name = "person-service"
main = "src/index.ts"
compatibility_date = "2026-07-01"

# The Worker performs NO auth itself — Cloudflare Access enforces at the edge post-deploy
# (see src/index.ts header comment). For that to be the ENTIRE boundary, the Worker must NOT
# be reachable at its public *.workers.dev URL (which bypasses the custom-domain Access app):
workers_dev = false

[[d1_databases]]
binding = "DB"
database_name = "person-service"
database_id = "6f44025d-a523-46d3-b2d2-1ad7fcd272aa"

# Custom domain (managed OUT OF BAND — intentionally NOT declared here):
#   notifs-people.4irl.app is the Worker's entire public surface, gated by a
#   Cloudflare Access self-hosted app on that exact hostname (docs/deploy-runbook.md
#   Wave 2 step 4). Lockstep: this hostname must stay in sync with the admin-UI Pages
#   Function's PERSON_SERVICE_URL runtime binding (set on the notifs-admin Pages project,
#   docs/deploy-runbook.md §6) — the Function proxies /people to this host server-side.
#   (The old VITE_PERSON_SERVICE_URL build-time bake was removed with the single-origin
#   redesign; the People view is now gated by VITE_PEOPLE_ENABLED instead.)
#
# The domain is attached via the dashboard (Workers & Pages → person-service →
# Domains & Routes), NOT a [[routes]] custom_domain block. Reason: reconciling a
# custom domain on deploy hits the zone-scoped /zones/<id>/workers/routes API, which
# would force the CI CLOUDFLARE_API_TOKEN to carry Zone · Workers Routes · Edit. We
# keep that token account-scoped (Pages/Workers Scripts/D1 only), so `wrangler deploy`
# here uploads the script alone and never touches zone routes. The already-attached
# custom domain is unaffected.
