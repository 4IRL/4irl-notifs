name = "person-service"
main = "src/index.ts"
compatibility_date = "2026-07-01"

# The Worker performs NO auth itself — Cloudflare Access enforces at the edge post-deploy
# (see src/index.ts header comment).

[[d1_databases]]
binding = "DB"
database_name = "person-service"
# Placeholder — the operator fills in the real database_id after running
# `wrangler d1 create person-service`. See docs/deploy-runbook.md Wave 2.
database_id = "00000000-0000-0000-0000-000000000000"

# Custom domain / route: the hostname for this Worker is an operator decision,
# to be made when it is wired into the Cloudflare Access + DNS setup described
# in docs/deploy-runbook.md Wave 2. Example (fill in once decided):
# [[routes]]
# pattern = "person-service.example.com/*"
# custom_domain = true
