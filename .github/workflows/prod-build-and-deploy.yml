name: Build and Deploy Production Stack

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  build-prod:
    if: github.event.pull_request.merged == true
    name: 'CD Prod - Build'
    uses: ./.github/workflows/prod-build.yml
    permissions:
      contents: read
      packages: write

  deploy-prod:
    if: github.event.pull_request.merged == true
    needs: build-prod
    name: 'CD Prod - Deploy'
    uses: ./.github/workflows/prod-deploy.yml
    permissions: read-all
    secrets:
      NOTIFS_SSH_HOST: ${{ secrets.NOTIFS_SSH_HOST }}
      NOTIFS_SSH_USERNAME: ${{ secrets.NOTIFS_SSH_USERNAME }}
      NOTIFS_SSH_PRIVATE_KEY_FILENAME: ${{ secrets.NOTIFS_SSH_PRIVATE_KEY_FILENAME }}
      NOTIFS_SSH_PRIVATE_KEY_VALUE: ${{ secrets.NOTIFS_SSH_PRIVATE_KEY_VALUE }}
      NOTIFS_SERVICE_TOKEN_ID: ${{ secrets.NOTIFS_SERVICE_TOKEN_ID }}
      NOTIFS_SERVICE_TOKEN_SECRET: ${{ secrets.NOTIFS_SERVICE_TOKEN_SECRET }}
      NOTIFS_NTFY_BASE_URL: ${{ secrets.NOTIFS_NTFY_BASE_URL }}
