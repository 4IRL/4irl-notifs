name: Build and Deploy Production Stack

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  build-prod:
    if: github.event.pull_request.merged == true
    name: 'CD Prod - Build'
    uses: ./.github/workflows/prod-build.yml
    permissions:
      contents: read
      packages: write
      actions: write   # lets the Actions Cache save buildx layers (else "cache reservation failed")

  deploy-prod:
    if: github.event.pull_request.merged == true
    needs: build-prod
    name: 'CD Prod - Deploy'
    uses: ./.github/workflows/prod-deploy.yml
    permissions: read-all
    secrets:
      PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
      PROD_SSH_USERNAME: ${{ secrets.PROD_SSH_USERNAME }}
      PROD_SSH_PRIVATE_KEY_FILENAME: ${{ secrets.PROD_SSH_PRIVATE_KEY_FILENAME }}
      PROD_SSH_PRIVATE_KEY_VALUE: ${{ secrets.PROD_SSH_PRIVATE_KEY_VALUE }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      # Wave-2 person-service dual-write credentials (optional; empty leaves the dual-write
      # auth unset — fails closed, swallowed — so core provisioning is unaffected).
      PERSON_SERVICE_ACCESS_CLIENT_ID: ${{ secrets.PERSON_SERVICE_ACCESS_CLIENT_ID }}
      PERSON_SERVICE_ACCESS_CLIENT_SECRET: ${{ secrets.PERSON_SERVICE_ACCESS_CLIENT_SECRET }}

  # Admin UI (Cloudflare Pages) is independent of the Docker image + VPS stack, so it runs in
  # parallel with build-prod/deploy-prod (no `needs`), gated by the same merged-to-main guard.
  deploy-admin-ui:
    if: github.event.pull_request.merged == true
    name: 'CD Prod - Deploy Admin UI'
    uses: ./.github/workflows/pages-deploy.yml
    permissions:
      contents: read
      actions: write   # lets the Actions Cache save the setup-node npm cache
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # person-service (Cloudflare Worker) is likewise independent of the Docker image + VPS
  # stack, so it runs in parallel (no `needs`), gated by the same merged-to-main guard.
  deploy-person-service:
    if: github.event.pull_request.merged == true
    name: 'CD Prod - Deploy person-service'
    uses: ./.github/workflows/worker-deploy.yml
    permissions:
      contents: read
      actions: write   # lets the Actions Cache save the setup-node npm cache
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
