name: Deploy to production VPS

permissions:
  contents: read
  packages: read

on:
  workflow_call:
    secrets:
      PROD_SSH_HOST:
        required: true
      PROD_SSH_USERNAME:
        required: true
      PROD_SSH_PRIVATE_KEY_FILENAME:
        required: true
      PROD_SSH_PRIVATE_KEY_VALUE:
        required: true
      CF_ACCESS_CLIENT_ID:
        required: true
      CF_ACCESS_CLIENT_SECRET:
        required: true

jobs:
  ProdDeploy:
    name: Deploy docker compose stack to the production VPS
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY_VALUE }}" > ~/.ssh/${{ secrets.PROD_SSH_PRIVATE_KEY_FILENAME }}
          chmod 600 ~/.ssh/${{ secrets.PROD_SSH_PRIVATE_KEY_FILENAME }}

      - name: Install Cloudflared
        run: |
          sudo curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/bin/cloudflared
          sudo chmod a+x /usr/bin/cloudflared

      # Special config file required for cloudflared tunnel ssh connection
      - name: Prepare SSH Config file
        run: |
          cat <<EOF > ~/.ssh/config
          Host ${{ secrets.PROD_SSH_HOST }}
            HostName ${{ secrets.PROD_SSH_HOST }}
            User ${{ secrets.PROD_SSH_USERNAME }}
            IdentityFile ~/.ssh/${{ secrets.PROD_SSH_PRIVATE_KEY_FILENAME }}
            IdentitiesOnly yes
            AddKeysToAgent yes
            ProxyCommand /usr/bin/cloudflared access ssh --hostname %h --id ${{ secrets.CF_ACCESS_CLIENT_ID }} --secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          EOF

          chmod 600 ~/.ssh/config

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false

      - name: Create stack directory on VPS
        run: |
          ssh -T -q -o StrictHostKeyChecking=no ${{ secrets.PROD_SSH_HOST }} 'mkdir -p /home/4irl-notifs/ntfy'

      - name: SCP Compose File Into Production Server
        run: |
          scp -T -q -o StrictHostKeyChecking=no docker-compose.prod.yml ${{ secrets.PROD_SSH_HOST }}:/home/4irl-notifs/

      - name: SCP ntfy Config Into Production Server
        run: |
          scp -T -q -o StrictHostKeyChecking=no ntfy/server.yml ${{ secrets.PROD_SSH_HOST }}:/home/4irl-notifs/ntfy/

      # Pull updated images, recreate only what changed, run as daemon, and prune old images.
      # This stack has no file-based ./secrets directory (u4i's DB/mail secrets have no
      # counterpart here) and no runtime .env — NTFY_BASE_URL is baked into the compose
      # file's default (a fixed, non-secret public hostname).
      #
      # `up -d` WITHOUT --force-recreate is deliberate: compose diffs image digest + compose
      # definition and recreates ONLY the services that changed. A typical API-only deploy
      # (new provisioning-api :latest) therefore recreates just provisioning-api and leaves
      # the ntfy container running — its long-lived subscriber connections survive the deploy.
      # Caveat: compose does NOT watch bind-mounted FILE CONTENTS, so a change to
      # ntfy/server.yml alone won't restart ntfy. When you change ntfy config, run a targeted
      # `docker compose up -d --force-recreate ntfy` manually. An ntfy VERSION bump IS a compose
      # definition change (image tag), so it recreates ntfy automatically on the next deploy.
      - name: Deploy Docker Compose Stack
        run: |
          ssh -T -q -o StrictHostKeyChecking=no ${{ secrets.PROD_SSH_HOST }} '
          cd /home/4irl-notifs;
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin;
          docker compose -f docker-compose.prod.yml pull;
          docker compose -f docker-compose.prod.yml up -d --remove-orphans;
          docker image prune -f;

          echo "Cleaning up docker login files..."
          rm -f ~/.docker/config.json
          ';
          sleep 30;

      # Verify the two services are up and running after any updates
      - name: Verify Docker Compose Stack
        run: >
          ssh -T -q -o StrictHostKeyChecking=no ${{ secrets.PROD_SSH_HOST }} '
          cd /home/4irl-notifs;
          hasNtfy=$(docker compose -f docker-compose.prod.yml ps --services --filter "status=running" | grep -x ntfy);
          hasProvisioningApi=$(docker compose -f docker-compose.prod.yml ps --services --filter "status=running" | grep -x provisioning-api);

          if [ -n "${hasNtfy}" ] && [ -n "${hasProvisioningApi}" ]; then
            echo "After 30 seconds, all of the services are up!";
            exit 0;
          else
            echo "After 30 seconds, one or more of the services is not up: ";
            [ "ntfy" != "${hasNtfy}" ] && echo "ntfy not operational";
            [ "provisioning-api" != "${hasProvisioningApi}" ] && echo "provisioning-api not operational";
            exit 1;
          fi;
          '
