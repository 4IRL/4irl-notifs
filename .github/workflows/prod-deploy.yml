name: Deploy to production VPS

permissions:
  contents: read
  packages: read

on:
  workflow_call:
    secrets:
      NOTIFS_SSH_HOST:
        required: true
      NOTIFS_SSH_USERNAME:
        required: true
      NOTIFS_SSH_PRIVATE_KEY_FILENAME:
        required: true
      NOTIFS_SSH_PRIVATE_KEY_VALUE:
        required: true
      NOTIFS_SERVICE_TOKEN_ID:
        required: true
      NOTIFS_SERVICE_TOKEN_SECRET:
        required: true
      NOTIFS_NTFY_BASE_URL:
        required: true

jobs:
  ProdDeploy:
    name: Deploy docker compose stack to the production VPS
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NOTIFS_SSH_PRIVATE_KEY_VALUE }}" > ~/.ssh/${{ secrets.NOTIFS_SSH_PRIVATE_KEY_FILENAME }}
          chmod 600 ~/.ssh/${{ secrets.NOTIFS_SSH_PRIVATE_KEY_FILENAME }}

      - name: Install Cloudflared
        run: |
          sudo curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/bin/cloudflared
          sudo chmod a+x /usr/bin/cloudflared

      # Special config file required for cloudflared tunnel ssh connection
      - name: Prepare SSH Config file
        run: |
          cat <<EOF > ~/.ssh/config
          Host ${{ secrets.NOTIFS_SSH_HOST }}
            HostName ${{ secrets.NOTIFS_SSH_HOST }}
            User ${{ secrets.NOTIFS_SSH_USERNAME }}
            IdentityFile ~/.ssh/${{ secrets.NOTIFS_SSH_PRIVATE_KEY_FILENAME }}
            IdentitiesOnly yes
            AddKeysToAgent yes
            ProxyCommand /usr/bin/cloudflared access ssh --hostname %h --id ${{ secrets.NOTIFS_SERVICE_TOKEN_ID }} --secret ${{ secrets.NOTIFS_SERVICE_TOKEN_SECRET }}
          EOF

          chmod 600 ~/.ssh/config

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false

      - name: Create stack directory on VPS
        run: |
          ssh -T -q -o StrictHostKeyChecking=no ${{ secrets.NOTIFS_SSH_HOST }} 'mkdir -p ~/4irl-notifs/ntfy'

      - name: SCP Compose File Into Production Server
        run: |
          scp -T -q -o StrictHostKeyChecking=no docker-compose.prod.yml ${{ secrets.NOTIFS_SSH_HOST }}:~/4irl-notifs/

      - name: SCP ntfy Config Into Production Server
        run: |
          scp -T -q -o StrictHostKeyChecking=no ntfy/server.yml ${{ secrets.NOTIFS_SSH_HOST }}:~/4irl-notifs/ntfy/

      # Pull updated images, recreate if needed, run as daemon, and prune old images.
      # This stack has no file-based ./secrets directory (u4i's DB/mail secrets have no
      # counterpart here) — the only runtime parameter is NTFY_BASE_URL via .env.
      - name: Deploy Docker Compose Stack
        run: |
          ssh -T -q -o StrictHostKeyChecking=no ${{ secrets.NOTIFS_SSH_HOST }} '
          cd ~/4irl-notifs;
          echo "NTFY_BASE_URL=${{ secrets.NOTIFS_NTFY_BASE_URL }}" > .env;
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin;
          docker compose -f docker-compose.prod.yml pull;
          docker compose -f docker-compose.prod.yml up --force-recreate -d;
          docker image prune -f;

          echo "Cleaning up docker login files..."
          rm -f ~/.docker/config.json
          ';
          sleep 30;

      # Verify the two services are up and running after any updates
      - name: Verify Docker Compose Stack
        run: >
          ssh -T -q -o StrictHostKeyChecking=no ${{ secrets.NOTIFS_SSH_HOST }} '
          cd ~/4irl-notifs;
          hasNtfy=$(docker compose -f docker-compose.prod.yml ps --services --filter "status=running" | grep -x ntfy);
          hasProvisioningApi=$(docker compose -f docker-compose.prod.yml ps --services --filter "status=running" | grep -x provisioning-api);

          if [ -n "${hasNtfy}" ] && [ -n "${hasProvisioningApi}" ]; then
            echo "After 30 seconds, all of the services are up!";
            exit 0;
          else
            echo "After 30 seconds, one or more of the services is not up: ";
            [ "ntfy" != "${hasNtfy}" ] && echo "ntfy not operational";
            [ "provisioning-api" != "${hasProvisioningApi}" ] && echo "provisioning-api not operational";
            exit 1;
          fi;
          '
