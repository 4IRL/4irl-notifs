name: Deploy admin UI to Cloudflare Pages

permissions:
  contents: read
  actions: write   # Actions Cache write for the setup-node npm cache (paired with the caller job's grant)

on:
  workflow_call:
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

env:
  # The SPA now calls same-origin relative paths (/v1/* and /people), proxied server-side by
  # web/functions/ to the backends — so no backend hostnames are baked in at build time. The
  # only build-time flag is VITE_PEOPLE_ENABLED, which turns on the People view for prod (local
  # dev omits it via an unset flag). The backend hostnames + service-token secrets are RUNTIME
  # Pages Function bindings (PROVISIONING_API_URL, PERSON_SERVICE_URL, PROXY_ACCESS_CLIENT_ID,
  # PROXY_ACCESS_CLIENT_SECRET), set on the Pages project — see docs/deploy-runbook.md §6.
  VITE_PEOPLE_ENABLED: 'true'

jobs:
  PagesDeploy:
    name: Build and deploy admin UI to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build admin UI
        working-directory: web
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web
          # --branch=main marks this as a PRODUCTION deployment (matches the project's
          # production branch); dist is relative to workingDirectory (web/).
          command: pages deploy dist --project-name=notifs-admin --branch=main
