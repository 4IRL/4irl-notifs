name: Tests

permissions:
  contents: read

on:
  workflow_call:

jobs:
  Test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: provisioning-api/go.mod
          cache-dependency-path: provisioning-api/go.sum

      - name: Run Go tests
        working-directory: provisioning-api
        run: go test ./...

      - name: Setup node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            person-service/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Run frontend unit tests (Vitest)
        working-directory: web
        run: npm test

      - name: Install worker dependencies
        working-directory: person-service
        run: npm ci

      - name: Run worker tests (Vitest + workers pool)
        working-directory: person-service
        run: npm test

  E2E:
    name: End-to-end
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e tests
        working-directory: web
        run: npx playwright test
