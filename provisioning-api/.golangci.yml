version: "2"

linters:
  default: standard
  enable:
    - misspell
    - unconvert
    - unparam
    - copyloopvar
    - gocritic
    - revive
  settings:
    revive:
      rules:
        - name: exported
        - name: var-naming
        - name: indent-error-flow
        - name: early-return

formatters:
  enable:
    - gofmt

run:
  timeout: 5m
